<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Sleep Outside | Checkout</title>

    <link rel="stylesheet" href="/css/style.css" />
    <script src="../js/checkout.js" type="module"></script>
  </head>

  <body>
    <header class="divider" id="main-header"></header>

    <main class="divider">
      <section class="products">
        <h2>Review & Place your Order</h2>
        <div class="checkout-layout">
          <form class="checkout-form" id="checkout-form">
            <fieldset>
              <legend>Customer Name</legend>
              <label for="fname">First Name</label>
              <input
                type="text"
                id="fname"
                name="fname"
                placeholder="John"
                required
              />
              <label for="lname">Last Name</label>
              <input
                type="text"
                id="lname"
                name="lname"
                placeholder="Doe"
                required
              />
            </fieldset>
            <fieldset>
              <legend>Address</legend>
              <label for="street">Street Address</label>
              <input
                type="text"
                id="street"
                name="street"
                placeholder="123 Main"
                required
              />
              <label for="city">City</label>
              <input
                type="text"
                id="city"
                name="city"
                placeholder="Rexburg"
                required
              />
              <label for="state">State</label>
              <input
                type="text"
                id="state"
                name="state"
                placeholder="ID"
                maxlength="2"
                required
              />
              <label for="zip">Zip Code</label>
              <input
                type="text"
                id="zip"
                name="zip"
                placeholder="83440"
                pattern="\d{5}(-\d{4})?"
                maxlength="10"
                required
              />
            </fieldset>
            <fieldset>
              <legend>Payment</legend>
              <label for="cardNumber">Credit Card Number</label>
              <input
                type="tel"
                id="cardNumber"
                name="cardNumber"
                placeholder="1234123412341234"
                pattern="\d{16}"
                maxlength="16"
                required
              />
              <label for="expiration">Expiration Date</label>
              <input
                type="text"
                id="expiration"
                name="expiration"
                placeholder="MM/YY"
                pattern="\d{1,2}/\d{2}"
                maxlength="5"
                required
              />
              <label for="code">Security Code</label>
              <input
                type="tel"
                id="code"
                name="code"
                placeholder="123"
                pattern="\d{3,4}"
                maxlength="4"
                required
              />
            </fieldset>
            <button type="submit" id="checkoutSubmit">Checkout</button>
          </form>
          <div class="order-summary">
            <h3>Order Summary</h3>
            <p><span>Subtotal:</span> <span id="subtotal">$0.00</span></p>
            <p><span>Tax (6%):</span> <span id="tax">$0.00</span></p>
            <p><span>Shipping:</span> <span id="shipping">$0.00</span></p>
            <p><span>Order Total:</span> <span id="orderTotal">$0.00</span></p>
          </div>
        </div>
      </section>
    </main>

    <footer id="main-footer"></footer>
  </body>
</html>
